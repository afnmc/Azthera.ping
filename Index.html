<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minecraft + Node Status</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/date-fns@2.30.0"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f1b;
      color: #e0e0ff;
      padding: 20px;
      margin: 0;
    }
    h1 {
      text-align: center;
      color: #4fc3f7;
      margin-bottom: 10px;
      font-size: 1.8em;
      cursor: pointer;
    }
    .refresh-info {
      text-align: center;
      color: #aaa;
      margin-bottom: 20px;
      font-size: 0.95em;
    }
    .server-card {
      background: #1a1a2e;
      border-left: 4px solid #4fc3f7;
      padding: 16px;
      border-radius: 8px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.3);
      margin-bottom: 20px;
      transition: transform 0.2s;
    }
    .server-card:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,0,0,0.4); }
    .server-name {
      font-size: 1.25em;
      color: #bb86fc;
      font-weight: bold;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .row { margin: 6px 0; display: flex; flex-wrap: wrap; }
    .label { width: 140px; color: #80deea; font-weight: bold; flex-shrink: 0; }
    .value { flex: 1; min-width: 200px; }
    .mc-online { color: #69f0ae; }
    .mc-offline { color: #ff5252; }
    .ping-value { color: #ffd54f; margin-left: 8px; }
    
    .chart-container {
      background: #161625;
      padding: 12px;
      border-radius: 8px;
      height: 220px;
      margin-top: 20px;
      position: relative;
    }
    .chart-placeholder {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #666;
      font-size: 0.9em;
      text-align: center;
      pointer-events: none;
    }
    .footer {
      text-align: center;
      color: #666;
      margin-top: 30px;
      font-size: 0.85em;
    }
    .motd-text { font-style: italic; color: #aaa; font-size: 0.9em; }
    
    .debug-panel {
      background: #2a2a4a;
      padding: 10px;
      border-radius: 6px;
      margin-top: 15px;
      font-size: 0.85em;
      display: none;
    }
    .debug-panel.show { display: block; }
    .debug-toggle {
      text-align: center;
      color: #80deea;
      cursor: pointer;
      margin: 10px 0;
      font-size: 0.9em;
    }
    .debug-toggle:hover { text-decoration: underline; }
  </style>
</head>

<body>

<h1>🚀 Panel Azthera SMP</h1>
<div class="refresh-info">
  🔄 Auto-refresh setiap 10 detik | Update ke-<strong id="counter">0</strong>
</div>

<div id="servers"></div>

<div class="chart-container">
  <canvas id="pingChart"></canvas>
  <div id="chartPlaceholder" class="chart-placeholder">
    📭 Belum ada data ping<br>
    <small>Client-side ping diukur dari waktu response API</small>
  </div>
</div>

<div class="debug-toggle" onclick="toggleDebug()">🔧 Toggle Debug Panel</div>
<div id="debugPanel" class="debug-panel">
  <strong>📋 Debug Log:</strong>
  <pre id="debugLog" style="margin:5px 0; color:#aaa; white-space:pre-wrap;"></pre>
</div>

<div class="footer">
  AztheraSMP Monitoring Panel • n-1.nura.host
</div>

<script>
  /* ===== ⚙️ SERVER LIST CONFIG ===== */
  const serverList = [
    { name: "Bungeecord", host: "aztherasmp.srv-mc.xyz", port: 25565, type: "java", enabled: true },
    { name: "Lobby", host: "n-1.nura.host", port: 25562, type: "java", enabled: true },
    { name: "SkyGens", host: "n-1.nura.host", port: 25560, type: "java", enabled: true },
    { name: "Heartless", host: "n-1.nura.host", port: 25577, type: "java", enabled: true },
    { name: "MiniGame", host: "n-1.nura.host", port: 25574, type: "java", enabled: true }
  ];

  let refreshCount = 0;
  const history = {};
  const maxHistory = 40;
  let debugMode = false;
  let chart = null;

  function log(msg) {
    if (!debugMode) return;
    const el = document.getElementById('debugLog');
    const time = new Date().toLocaleTimeString();
    el.textContent = `[${time}] ${msg}\n` + el.textContent;
    console.log(`[Panel] ${msg}`);
  }

  function toggleDebug() {
    debugMode = !debugMode;
    document.getElementById('debugPanel').classList.toggle('show', debugMode);
    log(`Debug mode: ${debugMode ? 'ON' : 'OFF'}`);
  }

  /* ============ 🎮 MINECRAFT PING + CLIENT-SIDE LATENCY ============ */
  async function getMCPing(host, port, type) {
    const startTime = performance.now(); // ✅ Start timer
    
    try {
      log(`Fetching ${type} ${host}:${port}...`);
      const res = await fetch(
        `https://api.mcstatus.io/v2/status/${type}/${host}:${port}`,
        { cache: "no-store" }
      );
      
      const endTime = performance.now(); // ✅ End timer
      const clientLatency = Math.round(endTime - startTime); // ✅ Calculate ping
      
      if (!res.ok) {
        log(`API error ${res.status} for ${host}:${port}`);
        return { online: false, ping: null };
      }
      
      const json = await res.json();
      log(`Response for ${host}:${port}: online=${json?.online}, clientPing=${clientLatency}ms`);

      if (!json?.online) return { online: false, ping: null };

      return {
        online: true,
        // ✅ Gunakan client-side latency sebagai proxy ping
        ping: clientLatency,
        players: json.players?.online ?? 0,
        maxPlayers: json.players?.max ?? 0,
        // ✅ Fix: ambil name_clean dari object version
        version: json.version?.name_clean ?? json.version?.name_raw ?? null,
        motd: json.motd?.clean ?? json.motd?.raw ?? null
      };
    } catch (e) {
      log(`Fetch error for ${host}:${port}: ${e.message}`);
      return { online: false, ping: null };
    }
  }

  /* ============ 📊 UPDATE SERVER DATA ============ */
  async function updateServerData() {
    return await Promise.all(
      serverList.map(async (srv, index) => {
        if (!srv.enabled) {
          return { ...srv, online: false, ping: null, players: 0 };
        }

        if (srv.type === "bedrock" || srv.type === "java") {
          const data = await getMCPing(srv.host, srv.port, srv.type);
          
          if (!history[index]) history[index] = [];
          
          // ✅ Simpan ping jika valid (number)
          if (data.online && typeof data.ping === 'number') {
            history[index].push({ 
              x: new Date().getTime(),
              y: data.ping 
            });
            if (history[index].length > maxHistory) {
              history[index].shift();
            }
            log(`Added ping ${data.ping}ms to ${srv.name}`);
          }
          
          return { ...srv, ...data };
        }

        return { ...srv, online: false, ping: null, players: 0 };
      })
    );
  }

  /* ============ 🎨 RENDER SERVER CARD ============ */
  function renderServers(data) {
    const container = document.getElementById("servers");
    container.innerHTML = "";

    data.forEach((srv) => {
      const card = document.createElement("div");
      card.className = "server-card";

      const statusIcon = srv.online ? "🟢" : "🔴";
      const statusClass = srv.online ? "mc-online" : "mc-offline";
      const statusText = srv.online ? "Online" : "Offline";
      const pingDisplay = typeof srv.ping === 'number' 
        ? `<span class="ping-value">⚡ ${srv.ping} ms</span>` 
        : "";

      card.innerHTML = `
        <div class="server-name">${statusIcon} ${srv.name}</div>
        <div class="row"><div class="label">📍 Address:</div><div class="value">${srv.host}:${srv.port}</div></div>
        <div class="row"><div class="label">📡 Status:</div><div class="value"><span class="${statusClass}">${statusText}</span>${pingDisplay}</div></div>
      `;

      if (srv.online && srv.players !== undefined) {
        card.innerHTML += `<div class="row"><div class="label">👥 Players:</div><div class="value">${srv.players}${srv.maxPlayers ? ' / ' + srv.maxPlayers : ''}</div></div>`;
      }
      if (srv.online && srv.version) {
        card.innerHTML += `<div class="row"><div class="label">🎮 Version:</div><div class="value">${srv.version}</div></div>`;
      }

      container.appendChild(card);
    });
  }

  /* ============ 📈 CHART SETUP ============ */
  function initChart() {
    const ctx = document.getElementById("pingChart").getContext("2d");
    const colors = ['#4fc3f7', '#bb86fc', '#69f0ae', '#ffab91', '#ffd54f'];

    chart = new Chart(ctx, {
      type: "line",
      data: {
        datasets: serverList.map((srv, i) => ({
          label: srv.name,
          data: [],
          borderColor: colors[i % colors.length],
          backgroundColor: colors[i % colors.length] + '33',
          borderWidth: 2,
          tension: 0.3,
          pointRadius: 2,
          pointHoverRadius: 4,
          fill: false,
        }))
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 0 },
        plugins: {
          legend: {
            labels: { color: '#e0e0ff', font: { size: 10 } },
            onClick: (e, legendItem) => {
              const index = legendItem.datasetIndex;
              const meta = chart.getDatasetMeta(index);
              meta.hidden = meta.hidden === null ? !chart.data.datasets[index].hidden : null;
              chart.update();
            }
          },
          tooltip: {
            mode: 'index',
            intersect: false,
            backgroundColor: '#1a1a2e',
            titleColor: '#bb86fc',
            bodyColor: '#e0e0ff',
            borderColor: '#4fc3f7',
            borderWidth: 1,
            callbacks: {
              label: (ctx) => `${ctx.dataset.label}: ${ctx.parsed.y} ms`
            }
          }
        },
        scales: {
          x: { 
            type: "time", 
            time: { 
              unit: "second",
              displayFormats: { second: 'HH:mm:ss' },
              tooltipFormat: 'PPpp'
            },
            ticks: { color: '#80deea', maxTicksLimit: 6, font: { size: 9 } },
            grid: { color: '#333' }
          },
          y: { 
            beginAtZero: true, 
            title: { text: "Ping (ms)", display: true, color: '#80deea' },
            ticks: { color: '#80deea', font: { size: 9 } },
            grid: { color: '#333' }
          }
        },
        interaction: { mode: 'nearest', axis: 'x', intersect: false }
      }
    });

    log("Chart initialized");
  }

  function updateChart() {
    if (!chart) return;
    
    let hasData = false;
    
    chart.data.datasets.forEach((ds, i) => {
      const data = history[i] || [];
      ds.data = data;
      if (data.length > 0) hasData = true;
    });
    
    const placeholder = document.getElementById('chartPlaceholder');
    placeholder.style.display = hasData ? 'none' : 'block';
    
    chart.update("none");
    log(`Chart updated - hasData: ${hasData}`);
  }

  /* ============ 🔄 MAIN LOOP ============ */
  async function updateAll() {
    refreshCount++;
    document.getElementById("counter").textContent = refreshCount;
    log(`=== Update #${refreshCount} ===`);

    try {
      const data = await updateServerData();
      renderServers(data);
      updateChart();
    } catch (err) {
      log(`Update error: ${err.message}`);
      console.error("[Update Error]", err);
    }
  }

  // Init
  document.addEventListener('DOMContentLoaded', () => {
    initChart();
    updateAll();
    setInterval(updateAll, 10000);
  });

  // Manual refresh
  document.querySelector('h1').addEventListener('click', () => {
    document.getElementById('counter').textContent = '🔄';
    updateAll();
  });

</script>

</body>
</html>
